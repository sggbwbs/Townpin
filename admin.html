<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TownPin — Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg-0:#050b14; --panel:#0f2038; --line:rgba(120,160,210,0.16);
    --paper:#f4efe4; --amber:#f2a65a; --amber-bright:#ffc07e; --ink:#f5f7fb; --ink-dim:#8fa3bd; --danger:#e0715a; }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg-0);color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;display:flex;align-items:flex-start;justify-content:center;padding:60px 20px;}
  h1{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:0 0 6px;}
  .sub{color:var(--ink-dim);font-size:13px;margin:0 0 28px;}
  .card{background:var(--paper);color:#26210f;max-width:520px;width:100%;border-radius:14px;padding:32px;}
  #loginCard input{width:100%;padding:12px 14px;border:1px solid #d8cfb4;border-radius:7px;
    font-size:14px;margin-bottom:14px;font-family:'IBM Plex Sans',sans-serif;background:#fffdf8;}
  button{border:none;border-radius:8px;padding:12px 20px;font-family:'Space Grotesk',sans-serif;
    font-weight:700;font-size:14px;cursor:pointer;background:linear-gradient(135deg,var(--amber-bright),var(--amber));color:#2a1c0d;}
  .err{color:#b8452f;font-size:13px;margin:-4px 0 14px;display:none;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
    color:#5c5440;margin-bottom:5px;}
  .field .langLabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a8168;margin:8px 0 3px;}
  .field textarea{width:100%;padding:9px 11px;border:1px solid #d8cfb4;border-radius:6px;font-size:13.5px;
    font-family:'IBM Plex Sans',sans-serif;background:#fffdf8;resize:vertical;min-height:44px;}
  .saveBar{position:sticky;bottom:-32px;background:var(--paper);padding:16px 0 0;margin-top:8px;
    display:flex;align-items:center;gap:14px;}
  .saved{color:#4a7a5c;font-size:13px;display:none;}
  #logoutLink{display:block;margin-top:18px;font-size:12px;color:#8a8168;text-decoration:underline;cursor:pointer;}
</style>
</head>
<body>

<div class="card" id="loginCard">
  <h1>TownPin Admin</h1>
  <p class="sub">Enter the admin password to edit site copy.</p>
  <input type="password" id="pwInput" placeholder="Password" />
  <div class="err" id="loginErr"></div>
  <button id="loginBtn">Log in</button>
</div>

<div class="card" id="editCard" style="display:none;">
  <h1>Edit site copy</h1>
  <p class="sub">Changes go live within a few seconds — no redeploy needed. Only the main marketing copy is editable here.</p>
  <div id="fields"></div>
  <div class="saveBar">
    <button id="saveBtn">Save changes</button>
    <span class="saved" id="savedMsg">✓ Saved</span>
  </div>
  <span id="logoutLink">Log out</span>
</div>

<script>
const FIELD_DEFS = [
  { key: 'locBadge', label: 'Location badge (small pill above the headline)' },
  { key: 'heroTitle', label: 'Headline (HTML allowed, e.g. <span>...</span> for the accent color)' },
  { key: 'heroSub', label: 'Subheading' },
  { key: 'value1', label: 'Value prop 1 — description (under "5€/kk")' },
  { key: 'value2b', label: 'Value prop 2 — bold number/label' },
  { key: 'value2', label: 'Value prop 2 — description' },
  { key: 'value3b', label: 'Value prop 3 — bold number/label' },
  { key: 'value3', label: 'Value prop 3 — description' },
  { key: 'footerText', label: 'Footer text' }
];

const API = '/api/admin';

async function checkAuth(){
  const res = await fetch(`${API}/check`);
  const data = await res.json();
  if (data.authenticated) showEditor();
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const password = document.getElementById('pwInput').value;
  const errBox = document.getElementById('loginErr');
  errBox.style.display = 'none';
  try{
    const res = await fetch(`${API}/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (!res.ok){ errBox.textContent = data.error || 'Login failed.'; errBox.style.display = 'block'; return; }
    showEditor();
  }catch(e){
    errBox.textContent = 'Network error.';
    errBox.style.display = 'block';
  }
});
document.getElementById('pwInput').addEventListener('keydown', (e)=>{
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutLink').addEventListener('click', async ()=>{
  await fetch(`${API}/logout`, { method: 'POST' });
  location.reload();
});

async function showEditor(){
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('editCard').style.display = 'block';

  const res = await fetch(`${API}/content`);
  const data = await res.json();
  const existing = {};
  (data.content || []).forEach(row => { existing[`${row.key}:${row.lang}`] = row.value; });

  const container = document.getElementById('fields');
  container.innerHTML = '';
  FIELD_DEFS.forEach(f => {
    const wrap = document.createElement('div');
    wrap.className = 'field';
    wrap.innerHTML = `
      <label>${f.label}</label>
      <div class="langLabel">Finnish</div>
      <textarea data-key="${f.key}" data-lang="fi">${existing[`${f.key}:fi`] || ''}</textarea>
      <div class="langLabel">English</div>
      <textarea data-key="${f.key}" data-lang="en">${existing[`${f.key}:en`] || ''}</textarea>
    `;
    container.appendChild(wrap);
  });
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const updates = [];
  document.querySelectorAll('#fields textarea').forEach(el => {
    if (el.value.trim()) {
      updates.push({ key: el.dataset.key, lang: el.dataset.lang, value: el.value });
    }
  });
  const res = await fetch(`${API}/content`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ updates })
  });
  const data = await res.json();
  if (res.ok){
    const msg = document.getElementById('savedMsg');
    msg.style.display = 'inline';
    setTimeout(()=> msg.style.display = 'none', 2500);
  } else {
    alert(data.error || 'Save failed.');
  }
});

checkAuth();
</script>
</body>
</html>
